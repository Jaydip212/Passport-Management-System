<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - GPMS</title>
  <link rel="stylesheet" href="/src/css/global.css">
  <link rel="stylesheet" href="/src/css/components.css">
  <style>
    .layout-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: rgba(30,41,59,0.9); border-right: 1px solid var(--border-color); padding: 2rem 1.5rem; display: flex; flex-direction: column; }
    .main-content { flex: 1; padding: 2.5rem; overflow-y: auto; background-image: radial-gradient(circle at 10% 90%, rgba(239, 68, 68, 0.05), transparent 30%); }
    .nav-item { padding: 0.75rem 1rem; border-radius: var(--radius-sm); color: var(--text-muted); margin-bottom: 0.5rem; display: block; transition: var(--transition); }
    .nav-item:hover, .nav-item.active { background: rgba(239, 68, 68, 0.15); color: white; border-left: 3px solid var(--danger); }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); padding: 1.5rem; border-radius: var(--radius-lg); border-top: 3px solid var(--danger); }
    .stat-card h4 { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: white; }
  </style>
</head>
<body>
  <div class="layout-wrapper">
    <aside class="sidebar">
      <h2 class="mb-4" style="color: var(--danger);">Admin Panel</h2>
      <nav>
        <a href="/admin/dashboard.html" class="nav-item active">Dashboard Overview</a>
        <a href="/admin/applications.html" class="nav-item">Manage Applications</a>
        <a href="/admin/users.html" class="nav-item">System Users</a>
      </nav>
      <div style="margin-top: auto;">
        <button id="logout-btn" class="btn btn-outline" style="width: 100%;">Logout</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="mb-4">
        <h2>Dashboard Overview</h2>
        <p class="text-muted">Real-time system statistics and metrics.</p>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <h4>Total Registrations</h4>
          <div class="value" id="stat-users">0</div>
        </div>
        <div class="stat-card">
          <h4>Total Applications</h4>
          <div class="value" id="stat-apps">0</div>
        </div>
        <div class="stat-card">
          <h4>Pending Review</h4>
          <div class="value" id="stat-pending" style="color: var(--warning);">0</div>
        </div>
        <div class="stat-card">
          <h4>Approved</h4>
          <div class="value" id="stat-approved" style="color: var(--success);">0</div>
        </div>
        <div class="stat-card">
          <h4>Scheduled Appointments</h4>
          <div class="value" id="stat-apts" style="color: var(--accent);">0</div>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from '/src/js/db.js';
    import { requireAdmin } from '/src/js/ui.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await requireAdmin(supabase);
      if (!session) return;

      // Fetch stats
      const { count: usersCount } = await supabase.from('profiles').select('*', { count: 'exact', head: true });
      document.getElementById('stat-users').innerText = usersCount || 0;

      const { data: apps } = await supabase.from('passport_applications').select('status');
      if (apps) {
        document.getElementById('stat-apps').innerText = apps.length;
        document.getElementById('stat-pending').innerText = apps.filter(a => ['Submitted', 'Under Review'].includes(a.status)).length;
        document.getElementById('stat-approved').innerText = apps.filter(a => a.status === 'Approved').length;
      }

      const { count: aptsCount } = await supabase.from('appointments').select('*', { count: 'exact', head: true }).eq('status', 'Scheduled');
      document.getElementById('stat-apts').innerText = aptsCount || 0;

      // Logout
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = '/admin-login.html';
      });
    });
  </script>
</body>
</html>
