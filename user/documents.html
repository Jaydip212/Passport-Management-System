<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Documents - GPMS</title>
  <link rel="stylesheet" href="/src/css/global.css">
  <link rel="stylesheet" href="/src/css/components.css">
  <style>
    .layout-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border-color); padding: 2rem 1.5rem; display: flex; flex-direction: column; }
    .main-content { flex: 1; padding: 2.5rem; overflow-y: auto; }
    .nav-item { padding: 0.75rem 1rem; border-radius: var(--radius-sm); color: var(--text-muted); margin-bottom: 0.5rem; display: block; transition: var(--transition); }
    .nav-item:hover, .nav-item.active { background: rgba(79, 70, 229, 0.15); color: white; }
    
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .doc-card {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 1rem;
    }
  </style>
</head>
<body>
  <div class="layout-wrapper">
    <aside class="sidebar">
      <h2 class="gradient-text mb-4">GPMS</h2>
      <nav>
        <a href="/user/dashboard.html" class="nav-item">Dashboard</a>
        <a href="/user/apply.html" class="nav-item">Apply Passport</a>
        <a href="/user/documents.html" class="nav-item active">Upload Documents</a>
        <a href="/user/track.html" class="nav-item">Track Status</a>
        <a href="/user/appointment.html" class="nav-item">Book Appointment</a>
      </nav>
    </aside>

    <main class="main-content">
      <h2 class="mb-4">Upload Documents</h2>

      <div class="card mb-4">
        <div class="form-group">
          <label class="form-label">Select Application</label>
          <select id="application-select" class="form-control">
            <option value="">Loading applications...</option>
          </select>
        </div>
      </div>

      <div id="upload-section" class="card hidden">
        <form id="upload-form">
          <div class="form-row align-center">
            <div class="form-group mb-0">
              <label class="form-label">Document Type</label>
              <select id="document_type" class="form-control" required>
                <option value="Passport Photo">Passport Photo</option>
                <option value="Aadhaar Card">Aadhaar Card</option>
                <option value="PAN Card">PAN Card</option>
                <option value="Address Proof">Address Proof (Utility Bill/Bank Passbook)</option>
                <option value="Birth Certificate">Birth Certificate</option>
              </select>
            </div>
            <div class="form-group mb-0">
              <label class="form-label">Select File (PDF/JPG/PNG)</label>
              <input type="file" id="file_input" class="form-control" accept=".jpg,.jpeg,.png,.pdf" required style="padding: 0.5rem;">
            </div>
            <div class="form-group mb-0" style="margin-top: 1.5rem;">
              <button type="submit" id="upload-btn" class="btn btn-primary btn-block">Upload</button>
            </div>
          </div>
        </form>

        <h4 class="mt-4 mb-2">Uploaded Documents</h4>
        <div class="doc-grid" id="doc-grid">
          <p class="text-muted">No documents uploaded yet.</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { supabase } from '/src/js/db.js';
    import { requireAuth, showToast, createLoader } from '/src/js/ui.js';

    let currentUserId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await requireAuth(supabase);
      if (!session) return;
      currentUserId = session.user.id;

      const appSelect = document.getElementById('application-select');
      const uploadSection = document.getElementById('upload-section');
      const docGrid = document.getElementById('doc-grid');

      // Load user apps
      const { data: apps } = await supabase.from('passport_applications').select('id, application_id').eq('user_id', currentUserId);
      
      if (apps && apps.length > 0) {
        appSelect.innerHTML = '<option value="">-- Choose an application --</option>';
        apps.forEach(app => {
          appSelect.innerHTML += `<option value="${app.id}">${app.application_id}</option>`;
        });
      } else {
        appSelect.innerHTML = '<option value="">No applications found</option>';
      }

      appSelect.addEventListener('change', (e) => {
        if (e.target.value) {
          uploadSection.classList.remove('hidden');
          loadDocuments(e.target.value);
        } else {
          uploadSection.classList.add('hidden');
        }
      });

      async function loadDocuments(appId) {
        docGrid.innerHTML = createLoader();
        const { data: docs, error } = await supabase.from('documents').select('*').eq('application_id', appId);
        
        if (error) {
          docGrid.innerHTML = `<p class="text-muted" style="color:var(--danger)">Error loading documents</p>`;
          return;
        }

        if (docs.length > 0) {
          let html = '';
          docs.forEach(doc => {
            let extension = doc.file_url.split('.').pop() || '';
            const isImage = ['jpg','jpeg','png'].includes(extension.toLowerCase());
            
            // Supabase get public URL
            const { data } = supabase.storage.from('documents').getPublicUrl(doc.file_url);

            html += `
              <div class="doc-card d-flex align-center justify-between">
                <div>
                  <p style="font-weight: 500;">${doc.document_type}</p>
                  <p class="text-muted" style="font-size: 0.8rem;">${new Date(doc.uploaded_at).toLocaleDateString()}</p>
                </div>
                <a href="${data.publicUrl}" target="_blank" class="btn btn-outline" style="padding: 0.5rem; font-size: 0.8rem;">View</a>
              </div>
            `;
          });
          docGrid.innerHTML = html;
        } else {
          docGrid.innerHTML = `<p class="text-muted">No documents uploaded yet.</p>`;
        }
      }

      document.getElementById('upload-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const appId = appSelect.value;
        const fileInput = document.getElementById('file_input');
        const docType = document.getElementById('document_type').value;
        const btn = document.getElementById('upload-btn');
        
        if (!fileInput.files.length) return showToast('Please select a file', 'error');
        const file = fileInput.files[0];

        // Size check (max 5mb)
        if (file.size > 5 * 1024 * 1024) return showToast('File must be less than 5MB', 'error');

        btn.innerHTML = createLoader();
        btn.disabled = true;

        const fileExt = file.name.split('.').pop();
        const fileName = `${currentUserId}/${appId}/${Date.now()}.${fileExt}`;

        // Upload to storage
        const { error: uploadError } = await supabase.storage.from('documents').upload(fileName, file);

        if (uploadError) {
          showToast('File upload failed: ' + uploadError.message, 'error');
        } else {
          // Check if doc_type already exists for this app to "Replace"
          const { data: existing } = await supabase.from('documents')
            .select('id')
            .eq('application_id', appId)
            .eq('document_type', docType);

          if (existing && existing.length > 0) {
            // Update
            await supabase.from('documents').update({
              file_url: fileName,
              uploaded_at: new Date()
            }).eq('id', existing[0].id);
          } else {
            // Insert
            await supabase.from('documents').insert({
              application_id: appId,
              user_id: currentUserId,
              document_type: docType,
              file_url: fileName
            });
          }
          
          showToast('Document uploaded successfully!', 'success');
          fileInput.value = '';
          loadDocuments(appId);
        }

        btn.innerHTML = 'Upload';
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
